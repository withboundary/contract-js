name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Node 24 ships with npm 11.x, which is required for OIDC trusted
      # publishing (needs npm >= 11.5.1). Node 22 bundles npm 10.x which
      # silently ignores OIDC env vars and falls back to anonymous publish
      # (resulting in an E404 from the registry).
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build

      - uses: changesets/action@v1
        with:
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
