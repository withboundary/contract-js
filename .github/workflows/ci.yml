name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same ref when a new commit lands — no point
# finishing an obsolete build.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run typecheck

      - run: pnpm run lint

      - run: pnpm run format:check

      - run: pnpm test

      - run: pnpm run build

      - name: Verify build output
        run: |
          test -f dist/index.js || (echo "dist/index.js missing" && exit 1)
          test -f dist/index.d.ts || (echo "dist/index.d.ts missing" && exit 1)

  # Single aggregate check for branch protection. Point the required status
  # check at `ci-ok` and the matrix can evolve without touching settings.
  ci-ok:
    if: always()
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: All required jobs passed
        if: needs.test.result != 'success'
        run: exit 1
