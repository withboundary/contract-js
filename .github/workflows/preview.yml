name: Preview release

# Publishes every PR to pkg.pr.new so reviewers (and downstream packages like
# @withboundary/sdk) can `npm i https://pkg.pr.new/withboundary/contract-js@<pr>`
# without waiting for a changeset + release. Also runs on main pushes so the
# latest built artifact is always installable from a commit SHA.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # pkg.pr.new posts the install URL as a PR comment.
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm dlx pkg-pr-new publish
